name: Compile Resume

on:
  push:
    paths:
      - "resume2.tex"

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume2.tex

      - name: Copy PDF to public folder
        run: cp resume2.pdf frontend/public/resume.pdf

      - name: Commit updated resume
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/resume.pdf
          git diff --staged --quiet || git commit -m "chore: auto-compile resume.pdf from resume2.tex"
          git push
